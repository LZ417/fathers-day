<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    <meta name="theme-color" content="#06101f" />
    <title>父亲节快乐，爸爸</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="particleCanvas" aria-hidden="true"></canvas>
    <div class="ambient-bg" aria-hidden="true"></div>
    <div class="scene-transition" id="sceneTransition" aria-hidden="true"></div>

    <main class="page-shell">
      <section class="hero" id="hero">
        <div class="hero__photo" aria-hidden="true"></div>
        <div class="hero__content">
          <p class="hero__eyebrow">Father's Day</p>
          <h1><span>父亲节快乐，</span><span>爸爸</span></h1>
          <p class="hero__subtitle">谢谢您一直以来的陪伴与支持</p>
          <p class="hero__copy">点击开启回忆，查看更多内容。</p>
          <button class="primary-button" id="startButton" type="button">
            <span>开启回忆</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 12h13.2" />
              <path d="m13 6 6 6-6 6" />
            </svg>
          </button>
        </div>
      </section>

      <section class="memory-section" id="memorySection" aria-label="照片回忆播放区">
        <div class="memory-topbar">
          <button class="back-button" id="backHomeButton" type="button" aria-label="返回首页">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6" />
            </svg>
            <span>返回首页</span>
          </button>
        </div>

        <div class="section-heading">
          <p class="section-kicker">Memory Film</p>
          <h2>照片回忆</h2>
        </div>

        <div class="memory-player" id="memoryPlayer" role="button" tabindex="0" aria-label="点击暂停或继续播放">
          <div class="film-frame" id="filmFrame">
            <div class="slides" id="slides"></div>
            <div class="transition-flash" id="transitionFlash" aria-hidden="true"></div>
          </div>
          <div class="player-meta">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="playStatus">自动播放回忆中</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
          </div>
        </div>

        <button class="secondary-button replay-button is-hidden" id="replayButton" type="button">
          重新播放
        </button>
        <button class="secondary-button is-hidden" id="showGalleryButton" type="button">
          查看家庭照片
        </button>
      </section>

      <section class="gallery-section" id="gallerySection" aria-label="家庭照片">
        <div class="section-heading">
          <p class="section-kicker">Family Album</p>
          <h2>家庭照片</h2>
          <p>点击查看大图，长按保存。</p>
        </div>
        <div class="photo-grid" id="photoGrid"></div>
      </section>

      <footer class="page-footer">等待视频播放完，可查看后续内容</footer>
    </main>

    <div class="preview" id="preview" aria-hidden="true">
      <button class="icon-button preview__close" id="previewClose" type="button" aria-label="关闭预览">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      </button>
      <button class="icon-button preview__nav preview__nav--prev" id="previewPrev" type="button" aria-label="上一张">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m15 18-6-6 6-6" />
        </svg>
      </button>
      <img id="previewImage" alt="家庭照片大图" />
      <button class="icon-button preview__nav preview__nav--next" id="previewNext" type="button" aria-label="下一张">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="m9 18 6-6-6-6" />
        </svg>
      </button>
      <div class="preview__info">
        <span id="previewCounter">1 / 8</span>
        <span>长按图片可保存到手机相册</span>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
